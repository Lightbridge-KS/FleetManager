name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test
        run: dotnet test --no-build --verbosity normal

  build-deb:
    name: Build .deb Package
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Extract version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: echo "VERSION=${REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build .deb package
        env:
          PKG_VERSION: ${{ steps.version.outputs.VERSION }}
        run: chmod +x ./packaging/build-deb.sh && ./packaging/build-deb.sh "$PKG_VERSION"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: fleet-agent-deb
          path: ./dist/fleet-agent_*.deb

  build-cli:
    name: Build CLI (${{ matrix.os-label }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - runtime: linux-x64
            os-label: linux-x64
          - runtime: osx-x64
            os-label: macos-x64
          - runtime: osx-arm64
            os-label: macos-arm64
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish fleet-ctl
        run: |
          dotnet publish src/Fleet.Cli \
            --configuration Release \
            --runtime ${{ matrix.runtime }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o ./publish

      - name: Package tarball
        run: |
          tar -czf fleet-ctl-${{ matrix.os-label }}.tar.gz \
            -C ./publish fleet-ctl

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: fleet-ctl-${{ matrix.os-label }}
          path: fleet-ctl-${{ matrix.os-label }}.tar.gz

  release:
    name: Create GitHub Release
    needs: [build-deb, build-cli]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            fleet-agent_*.deb
            fleet-ctl-*.tar.gz
          generate_release_notes: true
          draft: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
